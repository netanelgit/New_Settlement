<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1f2e;
  --border: #222840;
  --accent: #c8a96e;
  --text: #e8e2d5;
  --muted: #6a718a;
  --sidebar-w: 360px;

  --c-north: #e8a44a;
  --c-green: #52b077;
  --c-binyamin: #5b9dd4;
  --c-jericho: #d95f5f;
  --c-judea: #9b6ed4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-weight: 300;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  direction: rtl;
}

/* ── TOP BAR ── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 1000;
}

.topbar-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}

.topbar-title span { color: var(--accent); }

.topbar-sep { width: 1px; height: 24px; background: var(--border); }

.region-pills {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  flex: 1;
  scrollbar-width: none;
}
.region-pills::-webkit-scrollbar { display: none; }

.rpill {
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  flex-shrink: 0;
}
.rpill:hover { border-color: var(--accent); color: var(--accent); }
.rpill.active { color: #fff; border-color: transparent; }
.rpill[data-r="all"].active    { background: #333a52; color: var(--text); }
.rpill[data-r="north"].active  { background: var(--c-north); }
.rpill[data-r="green"].active  { background: var(--c-green); }
.rpill[data-r="binyamin"].active { background: var(--c-binyamin); }
.rpill[data-r="jericho"].active  { background: var(--c-jericho); }
.rpill[data-r="judea"].active    { background: var(--c-judea); }

.count-badge {
  margin-right: auto;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

/* ── BODY ── */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.search-wrap {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  outline: none;
  direction: rtl;
  transition: border-color 0.18s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); }

.list-container {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.list-container::-webkit-scrollbar { width: 4px; }
.list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.region-group { }

.region-label {
  padding: 10px 14px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 2;
}

.region-label::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.settlement-item {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.settlement-item:hover { background: rgba(255,255,255,0.04); }
.settlement-item.active { background: rgba(200,169,110,0.08); }

.item-num {
  font-size: 11px;
  color: var(--muted);
  font-family: 'Frank Ruhl Libre', serif;
  flex-shrink: 0;
  width: 20px;
  text-align: center;
  margin-top: 2px;
  direction: ltr;
}

.item-body { flex: 1; min-width: 0; }

.item-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}

.item-existing {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(80,200,130,0.15);
  color: #60d090;
  border: 1px solid rgba(80,200,130,0.2);
  margin-top: 3px;
  display: inline-block;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px;
  display: none;
  flex-shrink: 0;
  max-height: 200px;
  overflow-y: auto;
}
.detail-panel.open { display: block; }

.detail-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 6px;
}

.detail-location {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 8px;
}

.detail-desc {
  font-size: 13px;
  color: #9aa0b8;
  line-height: 1.7;
}

.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}

.dtag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* ── MAP ── */
#map {
  flex: 1;
  background: #0d0f14;
}

/* Leaflet dark overrides */
.leaflet-container { background: #111318; }
.leaflet-tile { filter: none; }
.leaflet-popup-content-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  color: var(--text);
  direction: rtl;
  font-family: 'Heebo', sans-serif;
}
.leaflet-popup-content {
  margin: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  min-width: 200px;
}
.leaflet-popup-tip { background: var(--surface); }
.leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; }

.popup-name {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  margin-bottom: 4px;
}
.popup-region { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; margin-bottom: 8px; }
.popup-loc { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.popup-desc { color: #9aa0b8; font-size: 12px; line-height: 1.6; }
.popup-existing { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(80,200,130,0.15); color: #60d090; border: 1px solid rgba(80,200,130,0.2); margin-bottom: 6px; }

/* Custom marker */
.custom-marker {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  transition: transform 0.15s;
  font-family: 'Heebo', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
}
.custom-marker:hover { transform: scale(1.3); z-index: 1000 !important; }
.custom-marker.pulse::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid currentColor;
  animation: pulse 1.5s infinite;
  opacity: 0.6;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}

/* No results */
.no-results {
  padding: 32px 14px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  display: none;
}

/* Zoom controls ltr */
.leaflet-control-zoom { direction: ltr; }

/* Mobile */
@media (max-width: 700px) {
  :root { --sidebar-w: 100%; }
  .app-body { flex-direction: column; }
  .sidebar { width: 100%; height: 45vh; border-left: none; border-top: 1px solid var(--border); order: 2; }
  #map { height: 55vh; order: 1; }
  .topbar-title { font-size: 14px; }
}

/* ── ABC LAYER LEGEND ── */
.rpill[data-r='abc'].active { background: var(--accent); color: #0d0f14; border-color: transparent; }
.abc-legend {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px;
  min-width: 118px;
  direction: rtl;
  font-family: 'Heebo', sans-serif;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.abc-legend-title {
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.06em;
}
.abc-legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 4px 0;
  color: var(--text);
}
.abc-legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: inline-block;
  flex-shrink: 0;
  opacity: 0.85;
}

/* ── STATE LAND LAYER LEGEND ── */
.rpill[data-r='state'].active { background: #4a8fe8; color: #fff; border-color: transparent; }
.state-legend {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 12px;
  min-width: 180px;
  direction: rtl;
  font-family: 'Heebo', sans-serif;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  margin-top: 6px;
}
.state-legend-title {
  font-weight: 700;
  margin-bottom: 8px;
  color: #4a8fe8;
  font-size: 11px;
  letter-spacing: 0.06em;
}
.state-legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 4px 0;
  color: var(--text);
}
.state-legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: inline-block;
  flex-shrink: 0;
  opacity: 0.85;
}
</style>
</head>

// ── MARKERS ──
const markers = {};
let activeId = null;

function createIcon(region, num, size) {
  const color = REGIONS[region].color;
  const s = size || 26;
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker" style="width:${s}px;height:${s}px;background:${color};font-size:${s>26?10:9}px">${num}</div>`,
    iconSize: [s, s],
    iconAnchor: [s/2, s/2],
    popupAnchor: [0, -s/2-4],
  });
}

SETTLEMENTS.forEach(s => {
  const marker = L.marker([s.lat, s.lng], { icon: createIcon(s.region, s.num) });
  const color = REGIONS[s.region].color;
  marker.bindPopup(`
    <div class="popup-name">${s.name}</div>
    <div class="popup-region" style="color:${color}">${REGIONS[s.region].label}</div>
    ${s.existing ? '<span class="popup-existing">הסדרת ישוב קיים</span>' : ''}
    <div class="popup-loc">📍 ${s.location}</div>
    <div class="popup-desc">${s.desc}</div>
  `);
  marker.on('click', () => selectItem(s.id, false));
  marker.addTo(map);
  markers[s.id] = marker;
});

const ABC_COLORS = {
  6:  { fill: '#e8734a', label: 'שטח A' },

  9:  { fill: '#52b077', label: 'שמורה' },

const abcLegendCtrl = L.control({ position: 'bottomleft' });
abcLegendCtrl.onAdd = function() {
  const div = L.DomUtil.create('div', 'abc-legend');
  div.id = 'abc-legend';
  div.style.display = 'none';
  div.innerHTML =
    '<div class="abc-legend-title">שטחי ABC</div>' +
    Object.values(ABC_COLORS).map(c =>
      '<div class="abc-legend-item"><span class="abc-legend-swatch" style="background:' + c.fill + '"></span>' + c.label + '</div>'
    ).join('');
  return div;
};
abcLegendCtrl.addTo(map);

function toggleABC(btn) {
  if (!abcVisible) {
    if (!abcLayer) {
      abcLayer = L.esri.featureLayer({
        url: 'https://services7.arcgis.com/LNelXmPD58p66zmN/ArcGIS/rest/services/ABCarea/FeatureServer/0',
        style: function(feature) {
          const c = ABC_COLORS[feature.properties.EZOR] || { fill: '#888888' };
          return {
            fillColor: c.fill,
            fillOpacity: 0.35,
            color: c.fill,
            weight: 1.2,
            opacity: 0.75,
          };
        },
        onEachFeature: function(feature, layer) {
          const c = ABC_COLORS[feature.properties.EZOR];
          if (c) layer.bindTooltip(c.label, { sticky: true, direction: 'top' });
        },
      });
    }
    abcLayer.addTo(map);
    abcLayer.bringToBack();
    abcVisible = true;
    btn.classList.add('active');
    document.getElementById('abc-legend').style.display = '';
  } else {
    map.removeLayer(abcLayer);
    abcVisible = false;
    btn.classList.remove('active');
    document.getElementById('abc-legend').style.display = 'none';
  }
}

// ── SIDEBAR BUILD ──
function buildList(items) {
  const container = document.getElementById('list-container');
  container.innerHTML = '';

  // Group by region
  const regionOrder = ['north','green','binyamin','jericho','judea'];
  const grouped = {};
  items.forEach(s => {
    if (!grouped[s.region]) grouped[s.region] = [];
    grouped[s.region].push(s);
  });

  let totalVisible = 0;
  regionOrder.forEach(r => {
    if (!grouped[r] || grouped[r].length === 0) return;
    const group = grouped[r];
    totalVisible += group.length;
    const grpDiv = document.createElement('div');
    grpDiv.className = 'region-group';

    const label = document.createElement('div');
    label.className = 'region-label';
    label.style.setProperty('--dot-color', REGIONS[r].color);
    label.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${REGIONS[r].color};display:inline-block;flex-shrink:0"></span>${REGIONS[r].label} <span style="opacity:0.5">(${group.length})</span>`;
    grpDiv.appendChild(label);

    group.forEach(s => {
      const item = document.createElement('div');
      item.className = 'settlement-item';
      item.id = `item-${s.id}`;
      item.dataset.id = s.id;
      item.innerHTML = `
        <div class="item-dot" style="background:${REGIONS[s.region].color}"></div>
        <div class="item-body">
          <div class="item-name">${s.name}</div>
          <div class="item-sub">${s.location}</div>
          ${s.existing ? '<div class="item-existing">הסדרת קיים</div>' : ''}
        </div>
        <div class="item-num">${s.num}</div>
      `;
      item.onclick = () => selectItem(s.id, true);
      grpDiv.appendChild(item);
    });

    container.appendChild(grpDiv);
  });

  document.getElementById('count-badge').textContent = `${totalVisible} יישובים`;
  document.getElementById('no-results').style.display = totalVisible === 0 ? 'block' : 'none';
}

// ── SELECT ──
function selectItem(id, flyTo) {
  // Deactivate previous
  if (activeId) {
    const prev = document.getElementById(`item-${activeId}`);
    if (prev) prev.classList.remove('active');
  }
  activeId = id;

  const el = document.getElementById(`item-${id}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const s = SETTLEMENTS.find(x => x.id === id);
  if (!s) return;

  if (flyTo) {
    map.flyTo([s.lat, s.lng], 13, { duration: 0.8 });
  }
  markers[id].openPopup();

  // Detail panel
  const panel = document.getElementById('detail-panel');
  const color = REGIONS[s.region].color;
  panel.innerHTML = `
    <div class="detail-name">${s.name}</div>
    <div class="detail-location">📍 ${s.location}</div>
    ${s.existing ? '<div class="item-existing" style="margin-bottom:8px">הסדרת ישוב קיים</div>' : ''}
    <div class="detail-desc">${s.desc}</div>
    <div class="detail-tags">${s.tags.map(t=>`<span class="dtag">${t}</span>`).join('')}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">🗺️ קואורדינטות מוערכות: ${s.lat.toFixed(3)}°N, ${s.lng.toFixed(3)}°E</div>
  `;
  panel.classList.add('open');
}

// ── FILTER ──
let currentRegion = 'all';
function filterRegion(r, btn) {
  currentRegion = r;
  document.querySelectorAll('.rpill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const visible = r === 'all' ? SETTLEMENTS : SETTLEMENTS.filter(s => s.region === r);
  const hidden = SETTLEMENTS.filter(s => !visible.includes(s));

  visible.forEach(s => {
    markers[s.id].setOpacity(1);
    markers[s.id].setZIndexOffset(0);
  });
  hidden.forEach(s => {
    markers[s.id].setOpacity(0.15);
    markers[s.id].setZIndexOffset(-1000);
  });

  buildList(visible);

  if (r !== 'all' && visible.length > 0) {
    const bounds = L.latLngBounds(visible.map(s => [s.lat, s.lng]));
    map.flyToBounds(bounds, { padding: [50, 50], duration: 0.7 });
  } else if (r === 'all') {
    map.flyTo([31.95, 35.25], 9, { duration: 0.6 });
  }

  document.getElementById('detail-panel').classList.remove('open');
  activeId = null;
}

// ── SEARCH ──
function searchSettlements(q) {
  const term = q.trim().toLowerCase();
  if (!term) {
    filterRegion(currentRegion, document.querySelector(`.rpill[data-r="${currentRegion}"]`));
    return;
  }
  const base = currentRegion === 'all' ? SETTLEMENTS : SETTLEMENTS.filter(s => s.region === currentRegion);
  const results = base.filter(s =>
    s.name.toLowerCase().includes(term) ||
    s.location.toLowerCase().includes(term) ||
    s.desc.toLowerCase().includes(term) ||
    s.tags.some(t => t.toLowerCase().includes(term))
  );
  buildList(results);
  results.forEach(s => markers[s.id].setOpacity(1));
  SETTLEMENTS.filter(s => !results.includes(s)).forEach(s => markers[s.id].setOpacity(0.15));
}

// ── INIT ──
buildList(SETTLEMENTS);
</script>
</body>
